<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 Not Found | The 11 View</title>
    <style>
.error-code,body{position:relative}.btn-secondary:hover,body{color:var(--text-primary)}.error-container,footer{text-align:center;width:100%}:root{--bg-color:#0f172a;--card-bg:#1e293b;--text-primary:#f8fafc;--text-secondary:#94a3b8;--accent-color:#38bdf8;--accent-hover:#0ea5e9;--font-mono:'SF Mono','Menlo','Monaco','Courier New',monospace;--font-sans:system-ui,-apple-system,sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{background-color:var(--bg-color);font-family:var(--font-sans);height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}.error-code,footer{font-family:var(--font-mono)}body::before{content:"";position:absolute;top:0;left:0;right:0;bottom:0;background-image:linear-gradient(rgba(56,189,248,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.03) 1px,transparent 1px);background-size:40px 40px;z-index:-1;mask-image:radial-gradient(circle at center,black 40%,transparent 80%)}.error-container{padding:2rem;max-width:600px;animation:.8s ease-out fadeIn}.error-code{font-size:8rem;font-weight:700;line-height:1;color:var(--accent-color);text-shadow:0 0 20px rgba(56,189,248,.3);margin-bottom:1rem;display:inline-block}.error-code:hover{animation:.3s cubic-bezier(.25,.46,.45,.94) infinite both glitch;cursor:default}.error-title{font-size:1.75rem;font-weight:600;margin-bottom:1rem;letter-spacing:-.025em}.error-description{color:var(--text-secondary);font-size:1.1rem;line-height:1.6;margin-bottom:2.5rem}.actions{display:flex;gap:1rem;justify-content:center;align-items:center}.btn{text-decoration:none;padding:.75rem 1.5rem;border-radius:6px;font-weight:500;transition:.2s;font-size:1rem}.btn-primary{background-color:var(--accent-color);color:var(--bg-color);box-shadow:0 4px 14px 0 rgba(56,189,248,.39)}.btn-primary:hover{background-color:var(--accent-hover);transform:translateY(-1px);box-shadow:0 6px 20px 0 rgba(56,189,248,.5)}.btn-secondary{color:var(--text-secondary);border:1px solid var(--text-secondary);background:0 0}.btn-secondary:hover{border-color:var(--text-primary);background:rgba(255,255,255,.05)}footer{position:absolute;bottom:2rem;font-size:.8rem;color:rgba(148,163,184,.4)}.server-info{display:inline-flex;align-items:center;gap:.5rem}.status-dot{width:8px;height:8px;background-color:#ef4444;border-radius:50%;display:inline-block}@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}@keyframes glitch{0%,100%{transform:translate(0)}20%{transform:translate(-2px,2px)}40%{transform:translate(-2px,-2px)}60%{transform:translate(2px,2px)}80%{transform:translate(2px,-2px)}}@media (max-width:600px){.error-code{font-size:6rem}.error-title{font-size:1.5rem}.actions{flex-direction:column;width:100%}.btn{width:100%;text-align:center}}
    </style>
</head>
<body>
    <main class="error-container">
        <div class="error-code" aria-hidden="true">404</div>
        <h1 class="error-title">Page Not Found</h1> 
        <p class="error-description">
            The requested URL was not found on this server. 
            If you entered the URL manually please check your spelling and try again.
        </p>
        <div class="actions">
            <a href="/" class="btn btn-primary">Return to Homepage</a>
            <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
        </div>
    </main>
    <footer>
        <div class="server-info">
            <span class="status-dot"></span>
            <span>nginx/1.24.0 (Ubuntu)</span>
        </div>
    </footer>
</body>
</html>
