<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanem</title>
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tanem.xyz">
    <meta property="og:title" content="Lovers rock">
    <meta property="og:description" content="A Question for you">
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/833/833472.png"> <!--Yes im lazy-->
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/833/833472.png">
    <link rel="stylesheet" href="main.css" type="text/css">
</head>
<body>
    <div class="background" id="bgLayer"></div>
    <div id="heartsContainer"></div>
    <div class="rain" id="rainContainer"></div>
    <div class="card" id="mainCard">
        <div id="questionView">
            <h1>Will you be my girlfriend?</h1>
            <p>I really luv you :3?</p>
            <div class="button-group">
                <button class="btn btn-yes" id="yesBtn">Yes</button>
                <button class="btn btn-no" id="noBtn">No</button>
            </div>
        </div>
        <div id="darkView" class="hidden">
            <h1>Wait...</h1>
            <p>Are you really leaving me in suffer and agony?</p>
            <div class="button-group">
                <button class="btn dark-btn" id="areYouSureBtn">Are you sure?</button>
                <button class="btn btn-yes" id="cantLiveBtn">No I can't live without you</button>
            </div>
        </div>
        <div id="sadView" class="sad-face-container">
            <div class="sad-emoji">😢</div>
            <h1 style="color: #888;">Okay...</h1>
        </div>
        <div id="loadingView" class="loading-container">
            <div class="heart-loader">
                <svg viewBox="0 0 24 24" fill="#ff6b81" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </div>
            <div class="loading-text">Loading Love...</div>
        </div>
        <div id="successView" class="success-container">
            <div class="big-heart-icon">
                 <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </div>
            <h1 class="success-message">I'll treat you right,<br>I promise.</h1>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
